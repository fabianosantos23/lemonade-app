<h3 class="mb-4 font-semibold text-slate-800">Ações</h3>
<div class="space-y-2">
  <button
    (click)="handleEditClick()"
    [disabled]="!canEdit()"
    class="flex w-full items-center gap-3 rounded-xl bg-slate-50 px-4 py-3 text-left transition-colors hover:bg-slate-100"
    [class.opacity-60]="!canEdit()"
    [class.cursor-not-allowed]="!canEdit()"
  >
    <svg
      class="h-5 w-5 text-slate-600"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"
      />
    </svg>
    <div>
      <p class="font-medium text-slate-800">Editar Produto</p>
      <p class="text-xs text-slate-500">Alterar informações e configurações</p>
    </div>
  </button>

  <button
    (click)="handleGenerateAIClick()"
    [disabled]="!canUseAI()"
    class="flex w-full items-center gap-3 rounded-xl bg-gradient-to-r from-blue-600 to-violet-600 px-4 py-3 text-left text-white transition-all hover:shadow-lg hover:shadow-blue-500/30"
    [class.opacity-60]="!canUseAI()"
    [class.cursor-not-allowed]="!canUseAI()"
  >
    <svg
      class="h-5 w-5 text-white"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"
      />
    </svg>
    <div>
      <p class="font-medium">Gerar descrição com IA</p>
      <p class="text-xs text-blue-100">Criar descrições otimizadas</p>
    </div>
  </button>

  @if (showPublishButton()) {
    <button
      (click)="publish.emit()"
      class="flex w-full items-center gap-3 rounded-xl bg-gradient-to-br from-green-50 to-emerald-50 px-4 py-3 text-left transition-all hover:shadow-md"
    >
      <svg
        class="h-5 w-5 text-green-600"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
        />
      </svg>
      <div>
        <p class="font-medium text-slate-800">Publicar Produto</p>
        <p class="text-xs text-slate-500">Enviar para os marketplaces</p>
      </div>
    </button>
  }

  <div class="my-3 h-px bg-slate-200"></div>

  <button
    (click)="delete.emit()"
    class="flex w-full items-center gap-3 rounded-xl bg-red-50 px-4 py-3 text-left transition-colors hover:bg-red-100"
  >
    <svg
      class="h-5 w-5 text-red-600"
      fill="none"
      stroke="currentColor"
      viewBox="0 0 24 24"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
      />
    </svg>
    <div>
      <p class="font-medium text-red-600">Excluir Produto</p>
      <p class="text-xs text-red-500">Ação permanente</p>
    </div>
  </button>
</div>
