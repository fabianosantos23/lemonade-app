<aside
  class="flex flex-col border-r border-slate-200 bg-white/80 backdrop-blur-md transition-all duration-300 h-full"
  [class.w-64]="sidebarExpanded()"
  [class.w-20]="!sidebarExpanded()"
>
  <!-- Logo -->
  <div class="flex items-center justify-between border-b border-slate-200 p-6">
    @if (sidebarExpanded()) {
      <a
        routerLink="/private/dashboard"
        class="group flex cursor-pointer items-center gap-3"
        title="Ir para a página inicial"
      >
        <div
          class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-blue-600 to-violet-600 transition-all group-hover:shadow-lg group-hover:shadow-blue-500/30"
        >
          <lucide-icon [img]="ZapIcon" class="h-6 w-6 text-white"></lucide-icon>
        </div>
        <span
          animate.enter="fade-in"
          animate.leave="fade-out"
          class="bg-gradient-to-r from-blue-600 to-violet-600 bg-clip-text text-xl font-bold text-transparent transition-opacity group-hover:opacity-80"
        >
          AutoProduto
        </span>
      </a>
    }
    <button
      (click)="toggleSidebar()"
      class="rounded-lg p-2 transition-colors hover:bg-slate-100"
      aria-label="Toggle sidebar"
    >
      <lucide-icon [img]="MenuIcon" class="h-5 w-5 text-slate-600"></lucide-icon>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto p-4">
    <ul class="space-y-2">
      @for (item of navigationItems(); track item.id) {
        <li>
          <a
            [routerLink]="item.route"
            class="flex items-center gap-3 rounded-xl px-4 py-3 transition-all duration-200"
            [class]="activeSection() === item.id
                ? 'bg-gradient-to-r from-blue-600 to-violet-600 text-white shadow-lg shadow-blue-500/30'
                : 'text-slate-600 hover:bg-slate-100'"
          >
            <lucide-icon [name]="item.icon" class="h-5 w-5 flex-shrink-0"></lucide-icon>
            @if (sidebarExpanded()) {
              <span class="font-medium">{{ item.label }}</span>
            }
          </a>
        </li>
      }
    </ul>
  </nav>

  <!-- User Profile -->
  <div class="border-t border-slate-200 p-4">
    <div
      class="flex cursor-pointer items-center gap-3 rounded-xl bg-slate-50 p-3 transition-colors hover:bg-slate-100"
    >
      <div
        class="flex h-10 w-10 items-center justify-center rounded-full bg-gradient-to-br from-blue-500 to-violet-500 font-semibold text-white"
      >
        {{ userInitials() }}
      </div>
      @if (sidebarExpanded()) {
        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-medium text-slate-800">
            {{ userName() }}
          </p>
          <p class="truncate text-xs text-slate-500">{{ userEmail() }}</p>
        </div>
        <button
          (click)="handleLogout()"
          class="rounded-lg p-2 transition-colors hover:bg-slate-200"
          aria-label="Sair"
        >
          <lucide-icon [img]="LogOutIcon" class="h-4 w-4 text-slate-600"></lucide-icon>
        </button>
      }
    </div>
  </div>
</aside>
