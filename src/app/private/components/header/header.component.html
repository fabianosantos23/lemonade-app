<header class="sticky top-0 z-10 border-b border-slate-200 bg-white/80 backdrop-blur-md">
  <div class="px-8 py-4">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        @if (showBack()) {
          <button
            (click)="handleBack()"
            class="rounded-lg p-2 transition-colors hover:bg-slate-100"
            title="Voltar"
          >
            <lucide-icon [img]="ChevronLeftIcon" class="h-5 w-5 text-slate-600"></lucide-icon>
          </button>
        }
        <div>
          <h1 class="text-2xl font-bold text-slate-800">
            {{ title() }}
          </h1>
          <p class="mt-1 text-sm text-slate-500">
            {{ subtitle() }}
          </p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <!-- Search -->
        <div class="relative hidden md:block">
          <input
            type="search"
            placeholder="Buscar produtos..."
            class="w-64 rounded-xl border border-slate-200 bg-slate-50 py-2 pl-10 pr-4 transition-all focus:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <div class="absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-slate-400">
            <lucide-icon [img]="SearchIcon" size="20" ></lucide-icon>
          </div>
        </div>

        <!-- Company Badge -->
        @if (currentCompany(); as company) {
          <div class="flex items-center gap-2 rounded-xl bg-blue-50 px-3 py-1.5">
            <lucide-icon [img]="Building2Icon" class="h-4 w-4 text-blue-600"></lucide-icon>
            <span class="text-sm font-bold text-blue-700">{{ company.name }}</span>
          </div>
        }

        <!-- Notifications -->
        <button
          class="relative rounded-xl p-2 transition-colors hover:bg-slate-100"
          aria-label="Notificações"
        >
          <lucide-icon [img]="BellIcon" class="h-6 w-6 text-slate-600"></lucide-icon>
          <span class="absolute right-1 top-1 h-2 w-2 rounded-full bg-red-500"></span>
        </button>

        <!-- Back to SuperAdmin Button -->
        @if (isImpersonating()) {
          <button
            (click)="handleStopImpersonating()"
            class="flex items-center gap-2 rounded-xl bg-purple-600 px-4 py-2 text-sm font-bold text-white shadow-lg transition-all hover:bg-purple-700 hover:shadow-purple-500/30"
          >
            <lucide-icon [img]="UserXIcon" class="h-4 w-4"></lucide-icon>
            <span>Voltar SuperAdmin</span>
          </button>
        }
      </div>
    </div>
  </div>
</header>
