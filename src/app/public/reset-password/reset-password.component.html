
<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-secondary-50">
  <!-- Header simplificado -->
  <header class="fixed left-0 right-0 top-0 z-50 bg-white/90 shadow-sm backdrop-blur-xl">
    <nav class="container-custom">
      <div class="flex h-20 items-center justify-between">
        <!-- Logo -->
        <a [href]="landingUrl" class="flex items-center gap-2 text-2xl font-bold text-secondary-900 transition-colors hover:text-primary-600 no-underline">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-primary-600 to-primary-700 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
          </div>
          <span class="hidden sm:inline-block">AutomatizaProdutos</span>
        </a>

        <!-- Voltar para home -->
        <a [href]="landingUrl" class="text-sm font-medium text-secondary-600 transition-colors hover:text-primary-600 no-underline">
          ← Voltar para início
        </a>
      </div>
    </nav>
  </header>

  <!-- Main Content -->
  <main class="pb-12 pt-20">
    <div class="container-custom">
      <div class="flex min-h-[calc(100vh-8rem)] items-center justify-center py-12">
        <!-- Card de Redefinição de Senha -->
        <div class="w-full max-w-md">
          <div class="glass rounded-2xl bg-white/95 p-8 shadow-2xl backdrop-blur-xl">
            <app-reset-password-form />

            <div class="rounded-lg border border-secondary-200 bg-secondary-50 p-4 mt-4">
              <div class="flex gap-3">
                <div class="flex-shrink-0">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="h-5 w-5 text-secondary-500"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                  >
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
                    />
                  </svg>
                </div>
                <div class="flex-1">
                  <p class="text-xs text-secondary-600">
                    <strong>Dica de segurança:</strong> Utilize uma senha única e evite usar datas de nascimento ou sequências simples.
                  </p>
                </div>
              </div>
            </div>

            <div class="mt-4 text-center">
              <a routerLink="/auth/login" class="text-sm font-medium text-primary-600 hover:text-primary-700 cursor-pointer no-underline">
                ← Voltar para o login
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
