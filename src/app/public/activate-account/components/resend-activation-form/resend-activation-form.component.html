<div class="animate-fade-in-up space-y-6">
  <!-- Header -->
  <div class="text-center">
    <h2 class="text-2xl font-bold text-secondary-900">Ativar sua conta</h2>
    <p class="mt-2 text-sm text-secondary-600">
      Digite seu email para receber um novo link de ativação
    </p>
  </div>

  <!-- Success Message -->
  @if (successMessage()) {
    <div class="border-success-200 text-success-800 rounded-lg border bg-success-50 p-4">
      {{ successMessage() }}
    </div>
  }

  <!-- Error Message -->
  @if (errorMessage()) {
    <div class="border-error-200 bg-error-50 text-error-800 rounded-lg border p-4">
      {{ errorMessage() }}
    </div>
  }

  <!-- Form -->
  <form [formGroup]="resendForm" (ngSubmit)="handleSubmit()" class="space-y-4" novalidate>
    <!-- Email -->
    <div>
      <label
        for="resend-email"
        class="mb-1.5 block text-sm font-medium text-secondary-700"
      >
        E-mail
      </label>
      <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5 text-secondary-400"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"
            />
          </svg>
        </div>
        <input
          id="resend-email"
          formControlName="email"
          type="email"
          autocomplete="email"
          required
          class="w-full rounded-lg border border-secondary-300 py-3 pl-10 pr-4 transition-all focus:border-transparent focus:ring-2 focus:ring-primary-500"
          placeholder="seu@email.com"
          [attr.disabled]="isLoading() ? true : null"
        />
      </div>
    </div>

    <!-- Submit Button -->
    <button
      type="submit"
      class="w-full rounded-lg bg-primary-600 px-4 py-3 font-semibold text-white transition-all hover:bg-primary-700 disabled:cursor-not-allowed disabled:opacity-70 flex items-center justify-center gap-2"
      [disabled]="isLoading() || resendForm.invalid"
    >
      @if (isLoading()) {
        <svg class="h-5 w-5 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Enviando...</span>
      } @else {
        <span>Reenviar email de ativação</span>
      }
    </button>
  </form>

  <!-- Help Text -->
  <div class="text-center">
    <p class="text-sm text-secondary-600">
      Já ativou sua conta?
      <button
        type="button"
        class="font-medium text-primary-600 transition-colors hover:text-primary-500"
        (click)="goToLogin()"
      >
        Fazer login
      </button>
    </p>
  </div>
</div>
