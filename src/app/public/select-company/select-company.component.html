<div class="min-h-screen bg-gradient-to-br from-primary-50 via-white to-secondary-50">
  <!-- Header simple -->
  <header class="fixed left-0 right-0 top-0 z-50 bg-white/90 shadow-sm backdrop-blur-xl">
    <nav class="container-custom mx-auto px-4">
      <div class="flex h-20 items-center justify-between">
        <div class="flex items-center gap-2 text-2xl font-bold text-secondary-900">
          <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-primary-600 to-primary-700 shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
          </div>
          <span>AutomatizaProdutos</span>
        </div>
        <button (click)="handleLogout()" class="text-sm font-medium text-secondary-600 transition-colors hover:text-error-600">
          Sair
        </button>
      </div>
    </nav>
  </header>

  <main class="flex min-h-screen items-center justify-center p-4">
    <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-xl">
      <div class="mb-6 text-center">
        <h1 class="mb-2 text-2xl font-bold text-secondary-900">
          Selecione a Empresa
        </h1>
        <p class="text-secondary-600">
          Você tem acesso a múltiplas empresas. Selecione qual deseja acessar agora.
        </p>
      </div>

      @if (companiesList().length === 0) {
        <div class="py-4 text-center text-secondary-500">
          Nenhuma empresa encontrada para seleção.
        </div>
      }

      <div class="space-y-3">
        @for (company of companiesList(); track company.id) {
          <button
            (click)="handleSelect(company)"
            class="group flex w-full items-center justify-between rounded-xl border border-secondary-200 bg-white p-4 text-left transition-all hover:border-primary-500 hover:shadow-md"
          >
            <div>
              <h3 class="font-semibold text-secondary-900 group-hover:text-primary-700">
                {{ company.name }}
              </h3>
              <p class="text-sm text-secondary-500">
                CNPJ: {{ company.cnpj | cnpj }}
              </p>
            </div>
            <div class="text-secondary-400 group-hover:text-primary-600">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
              </svg>
            </div>
          </button>
        }
      </div>
    </div>
  </main>
</div>
